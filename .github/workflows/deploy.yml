name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize owner to lowercase (Docker requires lowercase)
        id: vars
        shell: bash
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lower }}/minizapier:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            # Сначала Docker Compose v2 (плагин). Старый docker-compose 1.29.x с новым Engine
            # часто падает с KeyError: ContainerConfig при recreate.
            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml down --remove-orphans || true
              docker compose -f docker-compose.prod.yml up -d
            elif docker-compose version >/dev/null 2>&1; then
              docker-compose -f docker-compose.prod.yml pull
              # docker-compose v1.29 + новый Docker: баг KeyError ContainerConfig при recreate.
              # down + up создаёт контейнеры заново без проблемного пути recreate.
              docker-compose -f docker-compose.prod.yml down --remove-orphans || true
              docker-compose -f docker-compose.prod.yml up -d
            else
              echo "Нужен docker compose (v2): sudo apt-get install -y docker-compose-plugin" >&2
              exit 1
            fi
            # Опциональная агрессивная очистка (включать только если понимаете последствия):
            # создайте secret PRUNE_DOCKER_AFTER_DEPLOY=true
            if [ "${{ secrets.PRUNE_DOCKER_AFTER_DEPLOY }}" = "true" ]; then
              docker system prune -a --volumes -f
            fi

