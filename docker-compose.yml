services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minizapier}
      POSTGRES_USER: ${POSTGRES_USER:-minizapier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minizapier}
    # Host 5432 часто занят локальным PostgreSQL на Windows — Django тогда
    # подключается не к контейнеру. Снаружи используем 5433.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
