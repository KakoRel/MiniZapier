{% extends "base.html" %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1 class="page-title">Сброс пароля</h1>
    <p class="lead">Укажите email. Если почта включена в настройках, придёт ссылка.</p>
    <form method="post" action="{% url 'account_reset_password' %}" class="form-stack">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field.errors }}
          {{ field }}
        </div>
      {% endfor %}
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Отправить</button>
      </div>
    </form>
    <div class="auth-links">
      <p><a href="{% url 'account_login' %}">← Назад к входу</a></p>
    </div>
  </div>
{% endblock %}
