{% extends "base.html" %}

{% block title %}Новый сценарий{% endblock %}

{% block content %}
  <h1 class="page-title">Новый сценарий</h1>
  <p class="lead">Задайте название — затем откроется редактор на холсте.</p>

  <form method="post" action="{% url 'workflow_create' %}" class="auth-card form-stack">
    {% csrf_token %}
    <div class="form-field">
      <label for="id_name">Название</label>
      <input id="id_name" type="text" name="name" value="Мой сценарий" maxlength="200" autocomplete="off" />
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Создать и открыть редактор</button>
    </div>
  </form>

  <p class="page-back"><a href="{% url 'workflow_list' %}">← К списку</a></p>
{% endblock %}
